name: LLM Evals

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detectar módulos modificados
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            01-primer-eval:
              - 'modules/01-primer-eval/**'
            02-ragas-basics:
              - 'modules/02-ragas-basics/**'
            03-llm-as-judge:
              - 'modules/03-llm-as-judge/**'
            04-multi-turn:
              - 'modules/04-multi-turn/**'
            05-prompt-regression:
              - 'modules/05-prompt-regression/**'
            06-hallucination-lab:
              - 'modules/06-hallucination-lab/**'
            07-redteam-garak:
              - 'modules/07-redteam-garak/**'
            08-redteam-deepteam:
              - 'modules/08-redteam-deepteam/**'
            09-guardrails:
              - 'modules/09-guardrails/**'
            10-agent-testing:
              - 'modules/10-agent-testing/**'
            11-playwright-streaming:
              - 'modules/11-playwright-streaming/**'
            12-observability:
              - 'modules/12-observability/**'
            13-drift-monitoring:
              - 'modules/13-drift-monitoring/**'

  eval:
    name: "Eval: ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changes != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.changes) }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: uv sync --extra ci

      - name: Run evals (módulo ${{ matrix.module }})
        run: |
          uv run pytest modules/${{ matrix.module }}/tests/ \
            -v \
            --record-mode=none \
            -m "not slow and not redteam" \
            --tb=long
        env:
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ matrix.module }}
          path: reports/
          retention-days: 14
          if-no-files-found: ignore
