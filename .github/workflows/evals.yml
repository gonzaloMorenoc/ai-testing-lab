name: LLM Evals

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detectar módulos modificados
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
      module-01: ${{ steps.filter.outputs.module-01 }}
      module-02: ${{ steps.filter.outputs.module-02 }}
      module-03: ${{ steps.filter.outputs.module-03 }}
      module-04: ${{ steps.filter.outputs.module-04 }}
      module-05: ${{ steps.filter.outputs.module-05 }}
      module-06: ${{ steps.filter.outputs.module-06 }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            module-01:
              - 'modules/01-primer-eval/**'
            module-02:
              - 'modules/02-ragas-basics/**'
            module-03:
              - 'modules/03-llm-as-judge/**'
            module-04:
              - 'modules/04-multi-turn/**'
            module-05:
              - 'modules/05-prompt-regression/**'
            module-06:
              - 'modules/06-hallucination-lab/**'

  eval-module-01:
    name: "Eval: 01-primer-eval"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.module-01 == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install eval dependencies
        run: uv sync --extra eval

      - name: Cache Promptfoo
        uses: actions/cache@v4
        with:
          path: ~/.promptfoo/cache
          key: ${{ runner.os }}-promptfoo-${{ hashFiles('modules/01-primer-eval/**') }}
          restore-keys: |
            ${{ runner.os }}-promptfoo-

      - name: Run DeepEval evals (con cassettes)
        run: |
          uv run pytest modules/01-primer-eval/tests/ \
            -v \
            --record-mode=none \
            -m "not redteam" \
            --tb=long
        env:
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
          # Con Groq si hay secret configurado; si no, usa cassettes
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-module-01
          path: reports/
          retention-days: 14

  eval-module-02:
    name: "Eval: 02-ragas-basics"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.module-02 == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra eval
      - name: Run RAGAS evals
        run: |
          uv run pytest modules/02-ragas-basics/tests/ \
            -v --record-mode=none -m "not redteam" --tb=long
        env:
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
