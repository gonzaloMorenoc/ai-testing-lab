name: Red Team Nightly

on:
  workflow_dispatch:       # ejecución manual bajo demanda
  # schedule:
  #   - cron: "0 2 * * *"   # 02:00 UTC, cada noche — desactivado temporalmente

# NUNCA añadir trigger pull_request aquí — red team solo nightly
jobs:
  garak-scan:
    name: Garak — vulnerability scanner (módulo 07)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install redteam dependencies
        run: uv sync --extra redteam --no-install-project

      - name: Run vulnerability scanner (slow tests con LLM real)
        run: |
          uv run pytest modules/07-redteam-garak/tests/ \
            -m "slow" -v --tb=long
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
        continue-on-error: true   # red team puede fallar — es informativo

  deepteam-owasp:
    name: DeepTeam — OWASP Top 10 LLM (módulo 08)
    runs-on: ubuntu-latest
    needs: garak-scan
    if: always()

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra redteam --no-install-project

      - name: Run OWASP scan (slow tests con LLM real)
        run: |
          uv run pytest modules/08-redteam-deepteam/tests/ \
            -m "slow" -v --tb=long
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        continue-on-error: true

      - name: Upload red team report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report-${{ github.run_id }}
          path: reports/redteam/
          retention-days: 90
          if-no-files-found: ignore
