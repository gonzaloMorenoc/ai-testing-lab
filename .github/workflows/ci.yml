# Implementado en Fase 3 — ver docs/08-ci-cd.md
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --extra eval
      - name: Lint
        run: uv run ruff check .
      - name: Run deterministic tests (no LLM calls)
        run: uv run pytest modules/01-primer-eval/tests/ -v --record-mode=none -m "not slow"
