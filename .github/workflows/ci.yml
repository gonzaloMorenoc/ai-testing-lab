name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

  test:
    name: Tests módulos 01-13 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CI dependencies
        run: uv sync --extra ci

      - name: Run tests (módulos 01-13, sin API key)
        run: |
          uv run pytest \
            modules/01-primer-eval/tests/ \
            modules/02-ragas-basics/tests/ \
            modules/03-llm-as-judge/tests/ \
            modules/04-multi-turn/tests/ \
            modules/05-prompt-regression/tests/ \
            modules/06-hallucination-lab/tests/ \
            modules/07-redteam-garak/tests/ \
            modules/08-redteam-deepteam/tests/ \
            modules/09-guardrails/tests/ \
            modules/10-agent-testing/tests/ \
            modules/11-playwright-streaming/tests/ \
            modules/12-observability/tests/ \
            modules/13-drift-monitoring/tests/ \
            -m "not slow and not redteam" \
            --tb=short \
            -q \
            --cov=modules \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing
        env:
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            coverage.xml
            .pytest_cache/
          retention-days: 7
